[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "rqm-qiskit"
version = "0.1.0"
description = "SU(2)-native geometric bridge layer for Qiskit"
readme = "README.md"
license = { file = "LICENSE" }
authors = [{ name = "RQM Technologies" }]
requires-python = ">=3.10"
dependencies = [
    "numpy",
    "qiskit",
    # rqm-core has no published PyPI release or git tag yet; pinned to latest
    # known-good commit.  Update this SHA when a tagged release is available.
    "rqm-core @ git+https://github.com/RQM-Technologies-dev/rqm-core.git@5fce909b442a852de4aaf7cd306a53e5131e24fe",
]

[project.optional-dependencies]
dev = [
    "pytest",
]
simulator = [
    "qiskit-aer",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
